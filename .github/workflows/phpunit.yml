name: PHPUnit Tests

on:
  schedule:
    - cron: "0 12 * * *"
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  tests:
    name: PHP ${{ matrix.php-versions }} - MySQL ${{ matrix.mysql-versions }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-versions: ['8.2', '8.3', '8.4', '8.5']
        mysql-versions: ['8.0', '8.4']

    services:
      mysql:
        image: mysql:${{ matrix.mysql-versions }}
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: doctrine_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer
          extensions: redis, memcached
          coverage: xdebug
        env:
          update: true

      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php-versions }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php-versions }}-composer-

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --ansi

      - name: Run PHPUnit with coverage
        run: composer test -- --color=always --coverage-clover=build/logs/clover.xml

      - name: Upload coverage to Coveralls
        if: matrix.php-versions == '8.2' && matrix.mysql-versions == '8.0'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: PHP-${{ matrix.php-versions }}-MySQL-${{ matrix.mysql-versions }}
          parallel: true
          file: build/logs/clover.xml
          format: clover

  coveralls-finish:
    name: Coveralls Finished
    runs-on: ubuntu-latest
    needs: [tests]
    if: always()
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
          carryforward: "PHP-8.2-MySQL-8.0"
